<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 05</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Hooks  —  이벤트 종류</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">18가지 시점에 자동으로 내 명령을 끼워 넣습니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <!-- 좌측 박스: 차단 가능한 시점 -->
  <rect x="60" y="226" width="550" height="306" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="335" y="258" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#dc2626" letter-spacing="0.06em">차단 가능한 시점  (exit 2 로 실행 중단)</text>
  <text x="80" y="292" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">PreToolUse          도구 실행 직전</text>
  <text x="80" y="318" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">UserPromptSubmit   프롬프트 처리 전</text>
  <text x="80" y="344" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">PermissionRequest  권한 요청 시점</text>
  <text x="80" y="370" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">Stop               응답 완료 직전</text>
  <text x="80" y="396" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">SubagentStop       서브에이전트 종료</text>
  <text x="80" y="422" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">TeammateIdle       팀원 유휴 전환 전</text>
  <text x="80" y="448" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">TaskCompleted      작업 완료 표시 전</text>
  <text x="80" y="474" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">ConfigChange       설정 파일 변경 시</text>
  <text x="80" y="500" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">WorktreeCreate     워크트리 생성 전</text>
  <!-- 우측 박스: 관찰만 하는 시점 -->
  <rect x="630" y="226" width="590" height="306" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="925" y="258" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#16a34a" letter-spacing="0.06em">관찰만 하는 시점  (차단 불가)</text>
  <text x="650" y="292" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">SessionStart        세션 시작·재개 시</text>
  <text x="650" y="318" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">InstructionsLoaded  CLAUDE.md 로드 후</text>
  <text x="650" y="344" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">PostToolUse         도구 실행 성공 후</text>
  <text x="650" y="370" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">PostToolUseFailure  도구 실행 실패 후</text>
  <text x="650" y="396" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">Notification        알림 발생 시</text>
  <text x="650" y="422" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">SubagentStart       서브에이전트 시작</text>
  <text x="650" y="448" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">PreCompact          대화 압축 전</text>
  <text x="650" y="474" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">SessionEnd          세션 종료 시</text>
  <text x="650" y="500" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">WorktreeRemove      워크트리 제거 후</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">총 18개 이벤트  —  settings.json "hooks" 키에 시점별 명령어 등록</text>
</svg>
