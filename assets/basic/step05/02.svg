<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 05</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Sub Agent</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">특정 역할에 특화된 전담 에이전트를 만듭니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">어떻게 작동하나요?</text>
  <text x="60" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">별도 대화 공간에서 독립 실행  -&gt;  결과만 메인 에이전트에 전달</text>
  <text x="60" y="354" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">역할 설명이 일치하면 Claude가 알아서 해당 에이전트에 위임</text>
  <line x1="60" y1="398" x2="1220" y2="398" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="438" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">에이전트 설정 파일 구조</text>
  <text x="60" y="474" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">---</text>
  <text x="60" y="506" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">name: code-reviewer           # 에이전트 이름</text>
  <text x="60" y="538" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">description: '코드 품질을 검토합니다'   # 역할 설명</text>
  <text x="60" y="570" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">tools: Read, Glob, Grep    model: sonnet</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">/agents 명령어로 목록 조회 · 생성 · 수정 가능</text>
</svg>
