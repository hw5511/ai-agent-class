  <text x="60" y="498" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">홈 메뉴 우측  →  추가기능 클릭  →  Claude 검색 후 추가</text>
