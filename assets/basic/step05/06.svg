  <text x="60" y="338" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">Claude Pro 또는 Max 구독 계정 필요  (API 키 불필요)</text>
  <line x1="60" y1="378" x2="1220" y2="378" stroke="#e5e7eb" stroke-width="1"/>
