  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="600" fill="#ffffff">설치 후 우측 패널에서 claude.ai 계정으로 로그인하면 바로 사용 가능</text>
