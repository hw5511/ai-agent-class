<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 05</text>
  <text x="60" y="120" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Hooks  —  동작 구조</text>
  <text x="60" y="164" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">이벤트 발생 → 훅 실행 → 결과에 따라 진행 또는 차단</text>
  <line x1="60" y1="196" x2="1220" y2="196" stroke="#e5e7eb" stroke-width="1"/>
  <!-- 다이어그램 노드들 -->
  <!-- 사용자 프롬프트 -->
  <rect x="60" y="220" width="200" height="54" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="160" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#374151">사용자 프롬프트</text>
  <text x="160" y="268" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">UserPromptSubmit 훅</text>
  <!-- 화살표 -->
  <line x1="260" y1="247" x2="318" y2="247" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- PreToolUse 훅 -->
  <rect x="320" y="220" width="200" height="54" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="420" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#92400e">PreToolUse 훅</text>
  <text x="420" y="268" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#78350f">도구 실행 직전</text>
  <!-- 화살표 -->
  <line x1="520" y1="247" x2="578" y2="247" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 도구 실행 -->
  <rect x="580" y="220" width="200" height="54" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="680" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#1e40af">도구 실행</text>
  <text x="680" y="268" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#3b82f6">Read / Write / Bash 등</text>
  <!-- 화살표 -->
  <line x1="780" y1="247" x2="838" y2="247" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- PostToolUse 훅 -->
  <rect x="840" y="220" width="200" height="54" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="940" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#166534">PostToolUse 훅</text>
  <text x="940" y="268" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#16a34a">도구 실행 후</text>
  <!-- 화살표 -->
  <line x1="1040" y1="247" x2="1098" y2="247" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Stop 훅 -->
  <rect x="1100" y="220" width="120" height="54" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1160" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#5b21b6">Stop 훅</text>
  <text x="1160" y="268" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#7c3aed">응답 완료</text>
  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9ca3af"/>
    </marker>
  </defs>
  <!-- 차단 다운 화살표 (PreToolUse) -->
  <line x1="420" y1="274" x2="420" y2="354" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="320" y="356" width="200" height="44" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="420" y="375" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#dc2626">exit 2 → 차단</text>
  <text x="420" y="392" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" fill="#991b1b">stderr 메시지 → Claude에 전달</text>
  <!-- 계속 다운 화살표 (PostToolUse) -->
  <line x1="940" y1="274" x2="940" y2="354" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="840" y="356" width="200" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="940" y="375" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#16a34a">exit 0 → 계속 진행</text>
  <text x="940" y="392" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" fill="#15803d">자동 포맷팅 · 알림 등 실행</text>
  <!-- 활용 예시 -->
  <line x1="60" y1="440" x2="1220" y2="440" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="474" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">실제 활용 예시</text>
  <text x="60" y="514" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="18" fill="#374151">rm -rf 삭제 명령 자동 차단  /  파일 저장 시 자동 정렬  /  작업 완료 PC 알림</text>
  <rect x="60" y="556" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="587" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">Claude에게 '위험 명령 차단 Hook을 추가해줘'라고 요청하면 자동 작성</text>
</svg>
