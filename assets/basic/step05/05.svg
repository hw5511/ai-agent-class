<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 05</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Hooks  —  설정과 활용</text>
  <line x1="60" y1="180" x2="1220" y2="180" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="224" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">settings.json 구조</text>
  <text x="60" y="262" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">"hooks": { "PreToolUse": [{</text>
  <text x="60" y="294" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">   "matcher": "Bash", "hooks": [{ "type": "command", "command": "check.sh" }]</text>
  <text x="60" y="326" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">}] }</text>
  <line x1="60" y1="366" x2="1220" y2="366" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="406" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">Exit Code</text>
  <text x="60" y="442" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">exit 0  —  성공. stdout JSON 파싱 (컨텍스트 추가 가능)</text>
  <text x="60" y="478" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">exit 2  —  차단. stderr 내용이 Claude 피드백으로 전달</text>
  <line x1="60" y1="518" x2="1220" y2="518" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="554" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">활용 예시</text>
  <text x="60" y="586" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">rm -rf 패턴 차단  /  파일 저장 시 Prettier 자동 실행  /  OS 알림</text>

</svg>
