<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 05</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Sub Agent 활용법</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">Claude와 함께 만들고, 프롬프트로 바로 활용합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="258" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">만들기</text>
  <text x="60" y="298" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">/agents  →  Create new agent  →  Generate with Claude</text>
  <text x="60" y="334" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">역할 설명 입력  →  Claude가 설정 + 시스템 프롬프트 자동 생성</text>
  <line x1="60" y1="374" x2="1220" y2="374" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="414" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">실무 활용 예시  (비개발자)</text>
  <text x="60" y="454" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">보고서 작성 에이전트  /  데이터 정리 에이전트  /  번역 전담 에이전트</text>
  <line x1="60" y1="494" x2="1220" y2="494" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="534" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">병렬 실행  (프롬프트)</text>
  <text x="60" y="570" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#1d4ed8">'시장 조사 · 데이터 정리 · 보고서 초안을 별도 에이전트로 동시에 진행해줘'</text>
  <rect x="60" y="608" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="639" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">~/.claude/agents/ 에 저장하면 내 PC의 모든 프로젝트에서 사용 가능</text>
</svg>
