<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 07</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">MCP vs 스킬</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">MCP로 안 되는 것을 스킬으로 확장합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="60" y="226" width="530" height="220" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="325" y="260" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#6b7280" letter-spacing="0.08em">MCP (Discord)</text>
  <text x="80" y="298" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" fill="#374151">send-message  —  메시지 전송</text>
  <text x="80" y="334" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" fill="#374151">read-messages  —  채널 메시지 조회</text>
  <text x="80" y="374" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" fill="#dc2626">멘션 필터링 불가</text>
  <text x="80" y="410" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" fill="#dc2626">특정 User ID @멘션 불가</text>
  <rect x="630" y="226" width="590" height="220" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="925" y="260" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#1d4ed8" letter-spacing="0.08em">스킬 (Python 로직 추가)</text>
  <text x="650" y="298" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" fill="#374151">check_my_mention  —  내 멘션 필터링</text>
  <text x="650" y="334" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" fill="#374151">send_with_mention  —  보 ID를 @멘션</text>
  <text x="650" y="374" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" fill="#16a34a">1회성 조회  —  무한루프 없음</text>
  <text x="650" y="410" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="16" fill="#16a34a">MCP + 로직 = 스킬</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">MCP = 외부 서비스 연결  /  스킬 = Claude에게 단계적 절차 정의  —  둘을 조합하면 더 강력해집니다</text>
</svg>
