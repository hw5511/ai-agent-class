<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 07</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Skills</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">Claude의 기능을 확장하는 모듈형 시스템</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">파일 구조</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">.claude/skills/&lt;이름&gt;/SKILL.md     프로젝트 전용</text>
  <text x="60" y="348" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">~/.claude/skills/&lt;이름&gt;/SKILL.md   전체 프로젝트</text>
  <line x1="60" y1="394" x2="1220" y2="394" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="434" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">호출 방법</text>
  <text x="60" y="474" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">/skill-name              슬래시 명령어로 직접 호출</text>
  <text x="60" y="514" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">/skill-name [인수]      인수 전달 가능</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">관련 대화에서 Claude가 자동으로 Skill을 로드하기도 합니다</text>
