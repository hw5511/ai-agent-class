<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- 헤더 배지 -->
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fafafa" letter-spacing="0.8">BASIC 01</text>

  <rect x="150" y="44" width="54" height="24" rx="12" fill="#f0f4ff" stroke="#c7d7ff" stroke-width="1"/>
  <text x="177" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#3b5bdb">STEP 2</text>

  <text x="60" y="100" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="26" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">에이전트 동작 방식 ②</text>
  <text x="60" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#737373">AI에게 직접 질문하면 명령어를 알려주는 방식 — 하지만 실행은 여전히 사람이</text>
  <line x1="60" y1="138" x2="1220" y2="138" stroke="#e5e5e5" stroke-width="1.5"/>

  <!-- ChatGPT 창 -->
  <rect x="200" y="155" width="880" height="520" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>

  <!-- 창 헤더 -->
  <rect x="200" y="155" width="880" height="52" rx="12" fill="#f9f9f9" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="200" y="179" width="880" height="28" fill="#f9f9f9"/>

  <!-- 창 macOS 버튼 -->
  <circle cx="232" cy="181" r="6" fill="#ff5f57"/>
  <circle cx="252" cy="181" r="6" fill="#ffbd2e"/>
  <circle cx="272" cy="181" r="6" fill="#28c840"/>

  <!-- GPT 로고 (원형 + G) -->
  <circle cx="648" cy="181" r="14" fill="#10a37f"/>
  <text x="648" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">G</text>
  <text x="668" y="186" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#171717">ChatGPT</text>

  <!-- 새 채팅 아이콘 (오른쪽) -->
  <rect x="1016" y="168" width="50" height="26" rx="13" fill="#f3f4f6"/>
  <text x="1041" y="184" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#6b7280">+ 새 채팅</text>

  <!-- 대화 영역 배경 -->
  <rect x="200" y="207" width="880" height="468" rx="0" fill="#ffffff"/>
  <rect x="200" y="440" width="880" height="235" rx="0" fill="#ffffff"/>

  <!-- 사용자 메시지 (우측) -->
  <rect x="700" y="230" width="350" height="62" rx="16" fill="#10a37f"/>
  <text x="875" y="257" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#ffffff">컴퓨터 30분 뒤에</text>
  <text x="875" y="278" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#ffffff">예약종료하는 명령어 알려줄래?</text>

  <!-- 사용자 아바타 -->
  <circle cx="1072" cy="261" r="16" fill="#e5e7eb"/>
  <text x="1072" y="266" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#374151">나</text>

  <!-- GPT 아바타 -->
  <circle cx="222" cy="354" r="16" fill="#10a37f"/>
  <text x="222" y="359" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">G</text>

  <!-- GPT 응답 박스 -->
  <rect x="250" y="330" width="560" height="230" rx="12" fill="#f9f9f9" stroke="#e5e5e5" stroke-width="1"/>

  <text x="270" y="358" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#171717">물론이죠! 아래 명령어를 실행하시면 됩니다.</text>

  <!-- 코드 블록 -->
  <rect x="270" y="368" width="320" height="44" rx="6" fill="#1e1e1e"/>
  <text x="284" y="388" font-family="'Consolas','Courier New',monospace" font-size="15" font-weight="600" fill="#9cdcfe">shutdown</text>
  <text x="364" y="388" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#d4d4d4">-s -t</text>
  <text x="412" y="388" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#b5cea8">1800</text>
  <text x="284" y="404" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#6a9955">// 1800초 = 30분</text>

  <text x="270" y="432" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">위 명령어를 명령 프롬프트(cmd)에 입력하면</text>
  <text x="270" y="452" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">30분(1800초) 후에 컴퓨터가 자동으로 종료됩니다.</text>
  <text x="270" y="476" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">취소하려면 <tspan font-family="'Consolas','Courier New',monospace" fill="#d97706">shutdown -a</tspan> 를 입력하세요.</text>
  <text x="270" y="496" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">도움이 되셨으면 좋겠습니다.</text>

  <!-- 복사 버튼 -->
  <rect x="600" y="370" width="60" height="26" rx="5" fill="#2d2d2d"/>
  <text x="630" y="387" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#a3a3a3">복사</text>

  <!-- 입력창 -->
  <rect x="222" y="580" width="836" height="48" rx="24" fill="#f3f4f6" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="260" y="609" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#9ca3af">메시지 ChatGPT...</text>

  <!-- 우측 설명 패널 -->
  <rect x="1100" y="155" width="140" height="280" rx="8" fill="#fffbf0" stroke="#fde68a" stroke-width="1.5"/>
  <text x="1170" y="180" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#92400e">아직 남은 것</text>
  <line x1="1115" y1="190" x2="1225" y2="190" stroke="#fde68a" stroke-width="1"/>
  <rect x="1115" y="204" width="4" height="12" rx="2" fill="#f59e0b"/>
  <text x="1128" y="215" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#78350f">cmd를 직접 열어야 함</text>
  <rect x="1115" y="228" width="4" height="12" rx="2" fill="#f59e0b"/>
  <text x="1128" y="239" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#78350f">명령어 복사·붙여넣기</text>
  <rect x="1115" y="252" width="4" height="12" rx="2" fill="#f59e0b"/>
  <text x="1128" y="263" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#78350f">Enter 직접 눌러야 함</text>
  <line x1="1115" y1="278" x2="1225" y2="278" stroke="#fde68a" stroke-width="1"/>
  <text x="1170" y="300" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#92400e">AI가 알려주지만</text>
  <text x="1170" y="316" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#92400e">실행은 사람이</text>
  <text x="1170" y="332" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#92400e">직접 해야 합니다</text>

  <!-- 하단 -->
  <text x="640" y="698" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#a3a3a3">AI가 명령어를 알려주지만, 실행은 여전히 사람이 직접 해야 하는 방식</text>
</svg>
