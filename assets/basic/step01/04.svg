<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- 헤더 배지 -->
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fafafa" letter-spacing="0.8">BASIC 01</text>

  <rect x="150" y="44" width="54" height="24" rx="12" fill="#f0f4ff" stroke="#c7d7ff" stroke-width="1"/>
  <text x="177" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#3b5bdb">STEP 2</text>

  <text x="60" y="100" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="26" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">에이전트 동작 방식 ②</text>
  <text x="60" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#737373">AI에게 질문하면 명령어를 알려주는 방식 — 실행은 여전히 사람이</text>
  <line x1="60" y1="138" x2="1220" y2="138" stroke="#e5e5e5" stroke-width="1.5"/>

  <!-- ChatGPT 창 -->
  <rect x="160" y="155" width="900" height="520" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>

  <!-- 창 헤더 -->
  <rect x="160" y="155" width="900" height="52" rx="12" fill="#f9f9f9" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="160" y="179" width="900" height="28" fill="#f9f9f9"/>
  <circle cx="192" cy="181" r="6" fill="#ff5f57"/>
  <circle cx="212" cy="181" r="6" fill="#ffbd2e"/>
  <circle cx="232" cy="181" r="6" fill="#28c840"/>

  <!-- GPT 로고 -->
  <circle cx="618" cy="181" r="14" fill="#10a37f"/>
  <text x="618" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">G</text>
  <text x="638" y="186" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#171717">ChatGPT</text>

  <!-- 새 채팅 버튼 -->
  <rect x="990" y="168" width="56" height="26" rx="13" fill="#f3f4f6"/>
  <text x="1018" y="184" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#6b7280">+ 새 채팅</text>

  <!-- 대화 영역 배경 -->
  <rect x="160" y="207" width="900" height="468" fill="#ffffff"/>

  <!-- 사용자 메시지 (우측) -->
  <rect x="660" y="235" width="360" height="62" rx="16" fill="#10a37f"/>
  <text x="840" y="262" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#ffffff">컴퓨터 30분 뒤에</text>
  <text x="840" y="283" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#ffffff">예약종료하는 명령어 알려줄래?</text>

  <!-- 사용자 아바타 -->
  <circle cx="1042" cy="266" r="16" fill="#e5e7eb"/>
  <text x="1042" y="271" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#374151">나</text>

  <!-- GPT 아바타 -->
  <circle cx="188" cy="360" r="16" fill="#10a37f"/>
  <text x="188" y="365" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">G</text>

  <!-- GPT 응답 박스 -->
  <rect x="216" y="330" width="560" height="130" rx="12" fill="#f9f9f9" stroke="#e5e5e5" stroke-width="1"/>
  <text x="236" y="358" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#171717">물론이죠! 아래 명령어를 실행하시면 됩니다.</text>

  <!-- 코드 블록 -->
  <rect x="236" y="368" width="360" height="50" rx="6" fill="#1e1e1e"/>
  <text x="254" y="392" font-family="'Consolas','Courier New',monospace" font-size="17" font-weight="600" fill="#9cdcfe">shutdown</text>
  <text x="356" y="392" font-family="'Consolas','Courier New',monospace" font-size="17" fill="#d4d4d4">-s -t</text>
  <text x="414" y="392" font-family="'Consolas','Courier New',monospace" font-size="17" fill="#b5cea8">1800</text>
  <text x="254" y="410" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#6a9955">// 1800초 = 30분</text>

  <!-- 복사 버튼 -->
  <rect x="608" y="372" width="52" height="24" rx="5" fill="#2d2d2d"/>
  <text x="634" y="388" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#a3a3a3">복사</text>

  <!-- 입력창 -->
  <rect x="182" y="580" width="836" height="48" rx="24" fill="#f3f4f6" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="220" y="609" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#9ca3af">메시지 ChatGPT...</text>

  <!-- 우측 패널 -->
  <rect x="1090" y="155" width="150" height="200" rx="8" fill="#fffbf0" stroke="#fde68a" stroke-width="1.5"/>
  <text x="1165" y="180" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#92400e">아직 남은 것</text>
  <line x1="1105" y1="190" x2="1225" y2="190" stroke="#fde68a" stroke-width="1"/>

  <rect x="1105" y="206" width="4" height="12" rx="2" fill="#f59e0b"/>
  <text x="1118" y="217" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#78350f">cmd를 직접 열어야 함</text>

  <rect x="1105" y="232" width="4" height="12" rx="2" fill="#f59e0b"/>
  <text x="1118" y="243" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#78350f">명령어 복사·붙여넣기</text>

  <rect x="1105" y="258" width="4" height="12" rx="2" fill="#f59e0b"/>
  <text x="1118" y="269" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#78350f">Enter 직접 눌러야 함</text>
</svg>
