<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- 헤더 배지 -->
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fafafa" letter-spacing="0.8">BASIC 01</text>

  <rect x="150" y="44" width="54" height="24" rx="12" fill="#f0f4ff" stroke="#c7d7ff" stroke-width="1"/>
  <text x="177" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#3b5bdb">STEP 2</text>

  <text x="60" y="100" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="26" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">에이전트 동작 방식 ②</text>
  <text x="60" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#737373">AI에게 직접 질문하면 명령어를 알려주는 방식 — 하지만 실행은 여전히 사람이</text>
  <line x1="60" y1="138" x2="1220" y2="138" stroke="#e5e5e5" stroke-width="1.5"/>

  <!-- ChatGPT 창 -->
  <rect x="80" y="155" width="1140" height="520" rx="12" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>

  <!-- 창 헤더 -->
  <rect x="80" y="155" width="1140" height="48" rx="12" fill="#f9f9f9" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="80" y="179" width="1140" height="24" fill="#f9f9f9"/>
  <circle cx="112" cy="179" r="6" fill="#ff5f57"/>
  <circle cx="132" cy="179" r="6" fill="#ffbd2e"/>
  <circle cx="152" cy="179" r="6" fill="#28c840"/>

  <!-- ChatGPT 로고 -->
  <circle cx="648" cy="179" r="14" fill="#10a37f"/>
  <text x="648" y="184" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">G</text>
  <text x="668" y="184" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#171717">ChatGPT</text>

  <!-- 새 채팅 버튼 -->
  <rect x="1148" y="166" width="58" height="26" rx="13" fill="#f3f4f6"/>
  <text x="1177" y="182" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#6b7280">+ 새 채팅</text>

  <!-- 대화 영역 -->
  <rect x="80" y="203" width="1140" height="472" fill="#ffffff"/>

  <!-- 사용자 메시지 (우측) -->
  <rect x="724" y="224" width="380" height="62" rx="16" fill="#10a37f"/>
  <text x="914" y="251" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#ffffff">컴퓨터 30분 뒤에</text>
  <text x="914" y="272" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#ffffff">예약종료하는 명령어 알려줄래?</text>

  <!-- 사용자 아바타 -->
  <circle cx="1178" cy="255" r="16" fill="#e5e7eb"/>
  <text x="1178" y="260" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" fill="#374151">나</text>

  <!-- GPT 아바타 -->
  <circle cx="106" cy="354" r="16" fill="#10a37f"/>
  <text x="106" y="359" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">G</text>

  <!-- GPT 응답 박스 -->
  <rect x="134" y="326" width="640" height="228" rx="12" fill="#f9f9f9" stroke="#e5e5e5" stroke-width="1"/>

  <text x="154" y="354" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#171717">물론이죠! 아래 명령어를 실행하시면 됩니다.</text>

  <!-- 코드 블록 -->
  <rect x="154" y="364" width="360" height="46" rx="6" fill="#1e1e1e"/>
  <text x="172" y="386" font-family="'Consolas','Courier New',monospace" font-size="16" font-weight="600" fill="#9cdcfe">shutdown</text>
  <text x="278" y="386" font-family="'Consolas','Courier New',monospace" font-size="16" fill="#d4d4d4">-s -t</text>
  <text x="334" y="386" font-family="'Consolas','Courier New',monospace" font-size="16" fill="#b5cea8">1800</text>
  <text x="172" y="403" font-family="'Consolas','Courier New',monospace" font-size="11" fill="#6a9955">// 1800초 = 30분</text>

  <!-- 복사 버튼 -->
  <rect x="526" y="368" width="52" height="24" rx="5" fill="#2d2d2d"/>
  <text x="552" y="384" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" fill="#a3a3a3">복사</text>

  <text x="154" y="430" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">위 명령어를 명령 프롬프트(cmd)에 입력하면</text>
  <text x="154" y="450" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">30분(1800초) 후에 컴퓨터가 자동으로 종료됩니다.</text>
  <text x="154" y="474" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">취소하려면 <tspan font-family="'Consolas','Courier New',monospace" fill="#d97706">shutdown -a</tspan> 를 입력하세요.</text>
  <text x="154" y="494" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">도움이 되셨으면 좋겠습니다.</text>

  <!-- 입력창 -->
  <rect x="100" y="580" width="1060" height="48" rx="24" fill="#f3f4f6" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="140" y="609" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" fill="#9ca3af">메시지 ChatGPT...</text>
</svg>
