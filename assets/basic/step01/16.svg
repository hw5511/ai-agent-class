<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- 헤더 배지 -->
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fafafa" letter-spacing="0.8">BASIC 01</text>
  <rect x="150" y="44" width="66" height="24" rx="12" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="183" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#6b7280">macOS</text>

  <!-- 제목 -->
  <text x="60" y="100" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="26" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">Mac 설치 — Homebrew 설치</text>

  <!-- 설명 -->
  <text x="60" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">Homebrew는 macOS 전용 패키지 관리자입니다. Node.js 설치에 활용합니다.</text>

  <!-- Step 1: Terminal 실행 -->
  <rect x="60" y="178" width="1160" height="64" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="88" y="206" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#374151">1. Terminal 실행</text>
  <text x="88" y="228" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">Spotlight (Cmd + Space) 검색창에 Terminal 입력 후 실행</text>

  <!-- Step 2: Homebrew 설치 명령어 -->
  <rect x="60" y="260" width="1160" height="100" rx="12" fill="#1c1c1e"/>
  <text x="88" y="288" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#a3e635">2. Homebrew 설치 명령어 입력</text>
  <text x="88" y="316" font-family="'Courier New',Courier,monospace" font-size="14" fill="#e5e7eb">/bin/bash -c "$(curl -fsSL</text>
  <text x="88" y="340" font-family="'Courier New',Courier,monospace" font-size="14" fill="#e5e7eb">  https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"</text>

  <!-- Step 3: 비밀번호 입력 안내 -->
  <rect x="60" y="378" width="1160" height="64" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="88" y="406" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#d97706">3. Mac 로그인 비밀번호 입력 요청</text>
  <text x="88" y="428" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">비밀번호 입력 시 화면에 표시되지 않음 (정상) — 입력 후 엔터</text>

  <!-- Step 4: 설치 확인 -->
  <rect x="60" y="460" width="1160" height="64" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="88" y="488" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#374151">4. 설치 완료 확인</text>
  <text x="88" y="510" font-family="'Courier New',Courier,monospace" font-size="13" fill="#6b7280">brew --version  →  버전 숫자가 나오면 성공</text>

  <!-- 하단 안내 -->
  <text x="640" y="600" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af">설치 중 오류 발생 시: Xcode Command Line Tools 설치 여부 확인 (xcode-select --install)</text>
</svg>
