<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">

  <rect width="1280" height="720" fill="#ffffff"/>

  <!-- ── 헤더 ── -->
  <rect x="60" y="44" width="110" height="24" rx="12" fill="#171717"/>
  <text x="115" y="60" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="11" font-weight="600" fill="#fafafa" letter-spacing="0.8">INTRODUCTION</text>
  <text x="60" y="100"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="26" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">AI 에이전트란?</text>
  <line x1="60" y1="118" x2="1220" y2="118" stroke="#e5e5e5" stroke-width="1.5"/>

  <!-- ── 좌측: 신경망 일러스트 ── -->

  <!-- orbit ring -->
  <ellipse cx="320" cy="410" rx="143" ry="130" fill="none" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.2"/>

  <!-- brain core -->
  <circle cx="320" cy="410" r="78" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.3"/>
  <circle cx="320" cy="410" r="52" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
  <circle cx="320" cy="410" r="23" fill="#2563eb" opacity="0.15"/>
  <circle cx="320" cy="410" r="8" fill="#2563eb"/>

  <!-- connections -->
  <line x1="320" y1="410" x2="210" y2="282" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <line x1="320" y1="410" x2="503" y2="289" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <line x1="320" y1="410" x2="181" y2="437" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <line x1="320" y1="410" x2="246" y2="545" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <line x1="320" y1="410" x2="464" y2="528" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>

  <!-- SEE node -->
  <circle cx="210" cy="282" r="13" fill="#2563eb" opacity="0.2"/>
  <circle cx="210" cy="282" r="5" fill="#2563eb"/>
  <text x="210" y="260"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">SEE</text>

  <!-- THINK node -->
  <circle cx="503" cy="289" r="13" fill="#2563eb" opacity="0.2"/>
  <circle cx="503" cy="289" r="5" fill="#2563eb"/>
  <text x="503" y="267"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">THINK</text>

  <!-- PLAN node -->
  <circle cx="181" cy="437" r="13" fill="#2563eb" opacity="0.2"/>
  <circle cx="181" cy="437" r="5" fill="#2563eb"/>
  <text x="134" y="441"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">PLAN</text>

  <!-- DO node (우측, 선 없음 - 원본 동일) -->
  <circle cx="529" cy="415" r="13" fill="#2563eb" opacity="0.2"/>
  <circle cx="529" cy="415" r="5" fill="#2563eb"/>
  <text x="564" y="419"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">DO</text>

  <!-- FIX node -->
  <circle cx="246" cy="545" r="13" fill="#2563eb" opacity="0.2"/>
  <circle cx="246" cy="545" r="5" fill="#2563eb"/>
  <text x="212" y="569"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">FIX</text>

  <!-- TOOLS node -->
  <circle cx="464" cy="528" r="13" fill="#2563eb" opacity="0.2"/>
  <circle cx="464" cy="528" r="5" fill="#2563eb"/>
  <text x="500" y="552"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">TOOLS</text>

  <!-- loop arrow -->
  <path d="M503 410 Q515 355 475 315" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>
  <polygon points="477,311 471,319 479,319" fill="#2563eb" opacity="0.3"/>

  <!-- AUTONOMOUS LOOP -->
  <text x="320" y="608"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    text-anchor="middle" font-size="10" fill="#2563eb" opacity="0.5" font-weight="600"
    letter-spacing="0.1em">AUTONOMOUS LOOP</text>

  <!-- ── 우측: 개념 설명 ── -->

  <!-- 소제목 -->
  <text x="640" y="152"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="16" font-weight="700" fill="#0a0a0a">스스로 판단하고, 행동하는 AI</text>
  <text x="640" y="176"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="13" fill="#737373">단순히 질문에 답하는 AI를 넘어, 목표를 설정하고 계획하고 실행하는 자율적 시스템</text>

  <line x1="620" y1="194" x2="1220" y2="194" stroke="#f0f0f0" stroke-width="1"/>

  <!-- 항목 01 -->
  <circle cx="648" cy="232" r="18" fill="#171717"/>
  <text x="648" y="237" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="12" font-weight="700" fill="#fafafa">01</text>
  <text x="682" y="226"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="15" font-weight="700" fill="#0a0a0a">환경 인식</text>
  <text x="682" y="248"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="13" fill="#737373">파일, 웹, API 등 외부 환경을 스스로 탐색하고 정보를 수집</text>

  <line x1="620" y1="276" x2="1220" y2="276" stroke="#f0f0f0" stroke-width="1"/>

  <!-- 항목 02 -->
  <circle cx="648" cy="314" r="18" fill="#171717"/>
  <text x="648" y="319" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="12" font-weight="700" fill="#fafafa">02</text>
  <text x="682" y="308"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="15" font-weight="700" fill="#0a0a0a">자율 판단</text>
  <text x="682" y="330"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="13" fill="#737373">수집한 정보를 바탕으로 다음 행동을 스스로 결정</text>

  <line x1="620" y1="358" x2="1220" y2="358" stroke="#f0f0f0" stroke-width="1"/>

  <!-- 항목 03 -->
  <circle cx="648" cy="396" r="18" fill="#171717"/>
  <text x="648" y="401" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="12" font-weight="700" fill="#fafafa">03</text>
  <text x="682" y="390"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="15" font-weight="700" fill="#0a0a0a">도구 활용</text>
  <text x="682" y="412"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="13" fill="#737373">코드 실행, 파일 편집, 외부 서비스 호출 등 실제 작업을 수행</text>

  <line x1="620" y1="440" x2="1220" y2="440" stroke="#f0f0f0" stroke-width="1"/>

  <!-- 항목 04 -->
  <circle cx="648" cy="478" r="18" fill="#171717"/>
  <text x="648" y="483" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="12" font-weight="700" fill="#fafafa">04</text>
  <text x="682" y="472"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="15" font-weight="700" fill="#0a0a0a">반복 학습</text>
  <text x="682" y="494"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="13" fill="#737373">결과를 확인하고 부족하면 스스로 수정하며 목표를 달성할 때까지 반복</text>

  <line x1="620" y1="522" x2="1220" y2="522" stroke="#f0f0f0" stroke-width="1"/>

  <!-- 하단 프롬프트 예시 -->
  <text x="640" y="562"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="12" fill="#737373">"매출 자료를 분석해서 매주 월요일 오전 9시에 보고서를 만들어 이메일로 보내줘"</text>
  <text x="640" y="584"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif"
    font-size="12" fill="#2563eb" font-weight="600">→ AI 에이전트는 이 한 문장으로 전 과정을 자동 실행합니다</text>

</svg>
