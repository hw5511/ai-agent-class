<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#fafafa" letter-spacing="0.8">BASIC 01</text>
  <rect x="150" y="44" width="66" height="24" rx="12" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="183" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#6b7280">STEP 5</text>
  <text x="60" y="100" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="26" font-weight="800" fill="#0a0a0a" letter-spacing="-0.02em">claude 명령어 오류 시 PATH 설정</text>
  <text x="60" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">VS Code 터미널에서 'claude is not recognized' 오류가 발생하는 경우</text>
  <rect x="60" y="178" width="1160" height="54" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="88" y="210" font-family="'Courier New',Courier,monospace" font-size="13" fill="#dc2626">'claude' is not recognized as an internal or external command</text>
  <rect x="60" y="250" width="1160" height="52" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="88" y="276" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#374151">해결 방법</text>
  <text x="88" y="296" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">VS Code 터미널(PowerShell)에서 아래 명령어 실행 후 VS Code 재시작</text>
  <rect x="60" y="320" width="1160" height="72" rx="12" fill="#1c1c1e"/>
  <text x="88" y="360" font-family="'Courier New',Courier,monospace" font-size="16" fill="#e5e7eb">$env:PATH += &quot;;$env:APPDATA
pm&quot;</text>
  <text x="640" y="600" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#9ca3af">실행 후 VS Code를 완전히 닫고 다시 열면 claude 명령어가 인식됩니다</text>
</svg>