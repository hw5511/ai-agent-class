<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 06</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Notion MCP 등록</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">OAuth 방식  —  토큰 발급 없이 명령어 한 줄로 등록합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="258" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">1단계  —  작업 폴더에서 명령어 실행</text>
  <text x="60" y="294" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" fill="#6b7280">claude를 실행하려는 작업 디렉토리에서 아래 명령어 입력</text>
  <rect x="60" y="314" width="1160" height="52" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="88" y="346" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">claude mcp add --transport http notion https://mcp.notion.com/mcp</text>
  <line x1="60" y1="394" x2="1220" y2="394" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="434" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">2단계  —  추가 확인</text>
  <text x="60" y="470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" fill="#6b7280">아래 명령어로 notion이 목록에 추가되었는지 확인</text>
  <rect x="60" y="490" width="500" height="52" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="88" y="522" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">claude mcp list</text>
  <rect x="60" y="620" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="651" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">등록은 1회만 하면 됩니다  —  이후에는 인증만 하면 바로 사용 가능</text>
</svg>
