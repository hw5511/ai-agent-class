<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 06</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">MCP 설치와 세팅</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">claude mcp add 명령어로 서버를 등록합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="248" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">HTTP 방식 (원격 서버 — 권장)</text>
  <text x="60" y="282" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">claude mcp add --transport http [이름] [URL]</text>
  <line x1="60" y1="314" x2="1220" y2="314" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="348" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">직접 실행 방식 (내 PC에서 실행)</text>
  <text x="60" y="382" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">claude mcp add --transport stdio [이름] -- npx ...</text>
  <line x1="60" y1="414" x2="1220" y2="414" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="448" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">터미널 관리 명령어</text>
  <text x="60" y="482" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">claude mcp list  /  claude mcp remove [이름]</text>
  <line x1="60" y1="514" x2="1220" y2="514" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="548" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">claude 실행 후 안에서 관리</text>
  <text x="60" y="582" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">/mcp  →  연결된 서버 목록 조회 · 인증 · 관리</text>
  <rect x="60" y="618" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="649" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">scope: local (현재 프로젝트) · project (팀 공유) · user (내 PC 전체)</text>
</svg>
