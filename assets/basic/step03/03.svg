<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 03</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">settings.json</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">Claude Code 동작을 세밀하게 제어하는 설정 파일</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">3가지 적용 범위</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">~/.claude/settings.json          내 PC 전체 프로젝트에 적용</text>
  <text x="60" y="348" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">.claude/settings.json             현재 프로젝트 팀원과 공유</text>
  <text x="60" y="388" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">.claude/settings.local.json    현재 프로젝트 나만 적용</text>
  <text x="60" y="468" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">주요 설정 항목</text>
  <text x="60" y="510" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">model          기본 모델 지정  (예: claude-sonnet-4-5)</text>
  <text x="60" y="548" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">permissions    deny / allow 규칙 목록</text>
  <text x="60" y="586" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">env            환경 변수 주입</text>
  <rect x="60" y="620" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="651" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">차단 규칙은 허용 규칙보다 항상 먼저 적용됩니다</text>
</svg>
