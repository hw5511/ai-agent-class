<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 03</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">permissions — 허용 · 차단 규칙</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">도구 사용 범위를 규칙으로 직접 제어합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="258" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">규칙 형식</text>
  <text x="60" y="296" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">Tool                         도구 전체에 적용</text>
  <text x="60" y="330" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">Tool(specifier)        특정 조건만 적용</text>
  <line x1="60" y1="366" x2="1220" y2="366" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="404" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">예시</text>
  <text x="60" y="442" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">Bash(npm run *)        npm run 으로 시작하는 명령만 허용</text>
  <text x="60" y="476" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">Read(./.env)             .env 파일 읽기 차단</text>
  <text x="60" y="510" font-family="'Courier New',Courier,monospace" font-size="18" fill="#374151">Bash(rm -rf *)           rm -rf 명령 차단</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">평가 순서: deny → ask → allow  (먼저 일치하는 규칙이 적용)</text>
</svg>
