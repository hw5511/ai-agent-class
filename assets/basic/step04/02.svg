<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#171717"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">BASIC 04</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">세션 재개  /  이름 변경</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">이전 대화를 이어서 작업할 수 있습니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">/resume</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">claude --resume           대화형 세션 선택기 열기</text>
  <text x="60" y="348" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">claude --resume [name]   이름으로 세션 직접 재개</text>
  <text x="60" y="388" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">claude --continue          현재 디렉토리 최근 대화 이어서</text>
  <line x1="60" y1="430" x2="1220" y2="430" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="468" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">/rename</text>
  <text x="60" y="506" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">/rename auth-refactor    세션에 기억하기 쉬운 이름 부여</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#f3f4f6"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#6b7280">세션은 프로젝트 디렉토리 단위로 저장됩니다</text>
</svg>
