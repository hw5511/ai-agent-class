  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="36" font-weight="700" fill="#171717">Bash 실습</text>
  <line x1="60" y1="160" x2="1220" y2="160" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="60" y="178" width="1160" height="68" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="88" y="204" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#374151">1  폴더 생성</text>
  <text x="88" y="228" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">'work 폴더를 만들고 그 안에 docs 폴더도 만들어줘'</text>
  <rect x="60" y="260" width="1160" height="68" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
