  <text x="88" y="393" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#374151">이름을 잊거나 말투가 흐릿해지는 시점 = AI가 멍청해지는 신호</text>
