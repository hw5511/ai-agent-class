  <text x="88" y="274" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#374151">2  CLAUDE.md 파일 생성 + 이름 / 말투 / 역할 작성</text>
  <text x="88" y="296" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" fill="#6b7280">/clear 후 다시 '너는 누구야?' 질문 — 변화 확인</text>
