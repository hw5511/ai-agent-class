  <text x="60" y="462" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">Trigger Interval: Days  —  Trigger at Hour: 8</text>
  <text x="60" y="502" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">Cron 직접 입력: 0 8 * * *  (매일 오전 8시)</text>
