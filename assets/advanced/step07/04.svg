  <text x="60" y="578" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">Test workflow 버튼으로 즉시 실행 가능  —  스케줄 대기 불필요</text>

