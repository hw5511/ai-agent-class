<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 07</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">비주얼 소재 생성</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">이미지 생성 API로 블로그 썸네일·삽화를 자동 제작합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">이미지 생성 흐름</text>
  <text x="60" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">Claude로 주제에 맞는 이미지 프롬프트 자동 생성</text>
  <text x="60" y="354" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">이미지 생성 API 호출  -&gt;  PNG 파일 로컬 저장</text>
  <line x1="60" y1="400" x2="1220" y2="400" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="440" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">Python 연동 예시</text>
  <text x="60" y="478" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">resp = requests.post(IMAGE_API_URL,</text>
  <text x="60" y="514" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">    json={'prompt': img_prompt, 'size': '1024x1024'})</text>
  <text x="60" y="550" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">with open('thumb.png', 'wb') as f:</text>
  <text x="60" y="582" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">    f.write(resp.content)</text>

</svg>
