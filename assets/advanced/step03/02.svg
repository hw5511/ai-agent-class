<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 03</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">OAuth 인증 공통 가이드</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">GCP 5가지 API 모두 동일한 인증 방식을 사용합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">OAuth 2.0  —  사용자 계정 접근</text>
  <text x="60" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">사용자 동의 화면  -&gt;  OAuth 클라이언트 ID  -&gt;  credentials.json 다운로드</text>
  <text x="60" y="348" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">첫 실행 시 브라우저 인증  -&gt;  token.json 자동 생성  -&gt;  이후 자동 갱신</text>
  <line x1="60" y1="390" x2="1220" y2="390" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="430" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">서비스 계정  —  자동화 권장</text>
  <text x="60" y="468" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">서비스 계정 생성  -&gt;  JSON 키 발급  -&gt;  GOOGLE_APPLICATION_CREDENTIALS 환경변수</text>
  <text x="60" y="508" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">Sheets·Drive: 서비스 계정 이메일을 대상 리소스에 공유 필요</text>
  <line x1="60" y1="544" x2="1220" y2="544" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="560" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">pip install google-api-python-client google-auth google-auth-oauthlib</text>

</svg>
