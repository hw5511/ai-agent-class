<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 03</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Google Sheets API 연동</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">스프레드시트를 Python으로 읽고 씁니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">서비스 계정으로 인증</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">creds = service_account.Credentials.from_service_account_file(key_path)</text>
  <text x="60" y="344" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">service = build('sheets', 'v4', credentials=creds)</text>
  <line x1="60" y1="386" x2="1220" y2="386" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="426" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">데이터 읽기  /  쓰기</text>
  <text x="60" y="464" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">result = service.spreadsheets().values().get(</text>
  <text x="60" y="500" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">    spreadsheetId=SHEET_ID, range='Sheet1!A1:C10').execute()</text>
  <text x="60" y="536" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">service.spreadsheets().values().update(..., body={'values': data})</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#eff6ff"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#2563eb">SHEET_ID: 스프레드시트 URL에서 /d/ 이후 부분</text>
</svg>
