<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 03</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Google Docs  /  Drive API</text>
  <line x1="60" y1="180" x2="1220" y2="180" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="224" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">Docs API — 문서 자동 생성</text>
  <text x="60" y="262" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">service = build('docs', 'v1', credentials=creds)</text>
  <text x="60" y="298" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">doc = service.documents().create(body={'title': '리포트'}).execute()</text>
  <text x="60" y="334" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">service.documents().batchUpdate(documentId=doc_id, body=requests)</text>
  <line x1="60" y1="374" x2="1220" y2="374" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="414" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">Drive API — 파일 업로드 / 공유</text>
  <text x="60" y="452" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">service = build('drive', 'v3', credentials=creds)</text>
  <text x="60" y="488" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">media = MediaFileUpload('report.pdf', mimetype='application/pdf')</text>
  <text x="60" y="524" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">service.files().create(body={'name': 'report'}, media_body=media).execute()</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#eff6ff"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#2563eb">Docs batchUpdate로 텍스트·표·이미지 삽입 가능</text>
</svg>
