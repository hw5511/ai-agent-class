<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 02</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">워드 보고서 Skill  —  python-docx</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">분석 결과를 워드 문서로 자동 출력합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">설치</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">pip install python-docx</text>
  <line x1="60" y1="350" x2="1220" y2="350" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="390" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">핵심 코드</text>
  <text x="60" y="430" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">doc = Document()</text>
  <text x="60" y="466" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">doc.add_heading('분석 보고서', level=0)</text>
  <text x="60" y="502" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">doc.add_paragraph('내용')</text>
  <text x="60" y="538" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">doc.add_table(rows=3, cols=3)  /  doc.save('out.docx')</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#eff6ff"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#2563eb">주의: import는 from docx import Document  (python-docx X)</text>
</svg>
