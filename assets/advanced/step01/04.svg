<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 01</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Skill 스크립트 작성</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">requests 라이브러리로 API를 호출하고 이미지를 저장합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">핵심 코드 흐름</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">1.  os.getenv()  로 API 키 로드</text>
  <text x="60" y="348" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">2.  requests.post(url, headers=..., json={prompt})  호출</text>
  <text x="60" y="388" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">3.  응답 JSON에서 이미지 데이터 추출</text>
  <text x="60" y="428" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">4.  base64.b64decode()  디코딩 후 파일 저장</text>
  <line x1="60" y1="470" x2="1220" y2="470" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="510" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">SKILL.md</text>
  <text x="60" y="548" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">description + 스크립트 실행 지시사항 작성 후 /image-gen 으로 호출</text>

</svg>
