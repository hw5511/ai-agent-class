<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 06</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">PPT 파일 생성</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">python-pptx로 슬라이드를 자동 생성합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">설치</text>
  <text x="60" y="302" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">pip install python-pptx</text>
  <line x1="60" y1="336" x2="1220" y2="336" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="376" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">핵심 코드</text>
  <text x="60" y="414" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">from pptx import Presentation</text>
  <text x="60" y="448" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">prs = Presentation()</text>
  <text x="60" y="482" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">slide = prs.slides.add_slide(prs.slide_layouts[1])</text>
  <text x="60" y="516" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">slide.shapes.title.text = '제목'</text>
  <text x="60" y="550" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">slide.placeholders[1].text = '내용'</text>
  <text x="60" y="584" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">prs.save('output.pptx')</text>

</svg>
