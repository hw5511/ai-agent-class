  <text x="60" y="262" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">주제 입력  -&gt;  Gemini로 이미지 프롬프트 생성  -&gt;  이미지 API로 생성</text>
