  <text x="60" y="464" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#1d4ed8"> Gemini로 프롬프트를 먼저 최적화하고, 이미지 생성 Skill로</text>
