<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 04</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">Gemini API  —  텍스트 분석 + 멀티모달</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">Google AI Studio에서 API 키를 발급받아 Python에서 직접 호출합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">설치 + 기본 텍스트 호출</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">pip install google-generativeai</text>
  <text x="60" y="344" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">genai.configure(api_key=os.getenv('GEMINI_API_KEY'))</text>
  <text x="60" y="380" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">model = genai.GenerativeModel('gemini-2.0-flash')</text>
  <text x="60" y="416" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">resp = model.generate_content('프롬프트')  # resp.text 추출</text>
  <line x1="60" y1="452" x2="1220" y2="452" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="492" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">멀티모달  —  이미지 분석</text>
  <text x="60" y="530" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">img = PIL.Image.open('photo.jpg')</text>
  <text x="60" y="560" font-family="'Courier New',Courier,monospace" font-size="15" fill="#374151">resp = model.generate_content(['이 이미지를 설명해줘', img])  # 이미지+텍스트</text>

</svg>
