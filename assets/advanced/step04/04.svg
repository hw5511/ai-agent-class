<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 04</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">CLI 도구 개념  —  터미널 명령 실행 원리</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">Claude Code가 subprocess로 터미널 명령어를 직접 실행합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">subprocess  /  os.system</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">import subprocess, os</text>
  <text x="60" y="344" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">subprocess.run(['python', 'script.py', '--input', 'data.csv'])</text>
  <text x="60" y="380" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">result = subprocess.check_output(['ls', '-la'], text=True)  # 출력 캡처</text>
  <text x="60" y="416" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">os.system('mkdir -p output &amp;&amp; mv *.png output/')  # 셸 명령 직접 실행</text>
  <line x1="60" y1="452" x2="1220" y2="452" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="492" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">실용 예제</text>
  <text x="60" y="530" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">파일 정리:  확장자별 자동 분류  -&gt;  폴더 이동  -&gt;  결과 보고</text>
  <text x="60" y="560" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">배치 처리:  폴더 내 이미지 전체 리사이즈  -&gt;  완료 파일 목록 출력</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#eff6ff"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#2563eb">Claude Code = 에이전트 + 터미널 — 명령 실행과 코드 작성을 동시에</text>
</svg>
