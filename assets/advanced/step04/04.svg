<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 04</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">자동 회신 발송</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">MIMEText로 메일을 작성하고 API로 전송합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">메일 작성</text>
  <text x="60" y="304" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">msg = MIMEText(body_text)</text>
  <text x="60" y="340" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">msg['to'] = to  /  msg['subject'] = subject</text>
  <line x1="60" y1="382" x2="1220" y2="382" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="422" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">인코딩 + 발송</text>
  <text x="60" y="458" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">raw = base64.urlsafe_b64encode(msg.as_bytes()).decode()</text>
  <text x="60" y="494" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">service.users().messages().send(userId='me', body={'raw': raw})</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#2563eb"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="17" font-weight="600" fill="#ffffff">수신 확인 → 내용 요약 → 회신 작성 → 발송까지 자동화됩니다</text>
</svg>
