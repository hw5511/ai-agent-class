<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 04</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">NanoBanana API  —  AI 이미지 생성 Skill</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">SKILL.md + Python 스크립트로 이미지 생성 API를 Skill로 감쌉니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">Skill 구조</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">.claude/skills/image-gen/SKILL.md      진입점 · 사용법 정의</text>
  <text x="60" y="344" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">.claude/skills/image-gen/scripts/run.py  NanoBanana API 호출</text>
  <line x1="60" y1="386" x2="1220" y2="386" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="426" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">핵심 코드 흐름</text>
  <text x="60" y="464" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">1.  os.getenv('NANOBANANA_API_KEY')  로 API 키 로드</text>
  <text x="60" y="500" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">2.  requests.post(endpoint, headers=..., json={'prompt': prompt})</text>
  <text x="60" y="536" font-family="'Courier New',Courier,monospace" font-size="16" fill="#374151">3.  base64.b64decode(data)  -&gt;  타임스탬프 파일명으로 PNG 저장</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#eff6ff"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#2563eb">API 키는 환경변수로 관리 — 코드에 직접 입력 금지</text>
</svg>
