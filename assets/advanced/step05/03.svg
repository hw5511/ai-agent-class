<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 05</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">N8N 설치 환경 구성</text>
  <line x1="60" y1="180" x2="1220" y2="180" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="224" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">빠른 시작 (권장)</text>
  <text x="60" y="262" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">npx n8n</text>
  <text x="60" y="300" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">설치 없이 즉시 실행  →  http://localhost:5678 접속</text>
  <line x1="60" y1="344" x2="1220" y2="344" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="388" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">전역 설치</text>
  <text x="60" y="424" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">npm install n8n -g</text>
  <text x="60" y="460" font-family="'Courier New',Courier,monospace" font-size="19" fill="#374151">n8n start</text>
  <line x1="60" y1="500" x2="1220" y2="500" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="540" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">프로덕션</text>
  <text x="60" y="572" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">Docker  —  데이터 영속성·환경 관리에 적합</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#eff6ff"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#2563eb">Node.js 20.19 이상 필요</text>
