<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="60" y="44" width="78" height="24" rx="12" fill="#2563eb"/>
  <text x="99" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.05em">ADV 08</text>
  <text x="60" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="40" font-weight="700" fill="#171717">결과  Notion 보고</text>
  <text x="60" y="178" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#6b7280">작업 결과를 자동으로 Notion 항목에 기록합니다</text>
  <line x1="60" y1="212" x2="1220" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="264" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">Python 보고 흐름</text>
  <text x="60" y="308" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">result = run_claude(task_content)   # claude -p 실행</text>
  <text x="60" y="344" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">notion.pages.update(page_id, {</text>
  <text x="60" y="380" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">    'Status': {'select': {'name': '완료'}},</text>
  <text x="60" y="416" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">    'Result': {'rich_text': [{'text': {'content': result}}]}</text>
  <text x="60" y="452" font-family="'Courier New',Courier,monospace" font-size="17" fill="#374151">})</text>
  <line x1="60" y1="492" x2="1220" y2="492" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="532" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" letter-spacing="0.08em">Discord 알림 연동</text>
  <text x="60" y="562" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="19" fill="#374151">작업 완료 후 Discord Webhook으로 담당자에게 자동 알림 전송</text>
  <rect x="60" y="568" width="1160" height="52" rx="10" fill="#eff6ff"/>
  <text x="640" y="599" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="15" fill="#2563eb">Notion이 작업 이력과 결과의 단일 저장소가 됩니다</text>
</svg>
