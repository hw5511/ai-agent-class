<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 에이전트 수업자료</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
    <style>
        /* ============================================
           Design Tokens (consultation 동일)
           ============================================ */
        :root {
            --bg: #fff;
            --fg: #0a0a0a;
            --card: #fff;
            --primary: #171717;
            --primary-fg: #fafafa;
            --secondary: #f5f5f5;
            --secondary-fg: #171717;
            --muted: #f5f5f5;
            --muted-fg: #737373;
            --border: #e5e5e5;
            --accent: #2563eb;
            --accent-fg: #fff;
            --accent-muted: #eff6ff;
            --accent-border: #bfdbfe;
            --success: #16a34a;
            --success-muted: #f0fdf4;
            --radius: 0.5rem;
            --radius-lg: 1rem;
            --radius-full: 9999px;
            --font-xs: 0.75rem;
            --font-sm: 0.875rem;
            --font-base: 1rem;
            --font-lg: 1.125rem;
            --font-xl: 1.25rem;
            --font-2xl: 1.5rem;
            --font-3xl: 2rem;
            --sidebar-width: 260px;
            --header-height: 56px;
        }

        /* ============================================
           Reset & Base
           ============================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ============================================
           Header
           ============================================ */
        .app-header {
            height: var(--header-height);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1.5rem;
            flex-shrink: 0;
            background: var(--bg);
            z-index: 100;
        }

        .header-logo {
            font-size: var(--font-base);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--fg);
            white-space: nowrap;
        }

        .header-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
        }

        /* Course Tabs */
        .course-tabs {
            display: flex;
            gap: 0.25rem;
            background: var(--secondary);
            padding: 0.25rem;
            border-radius: var(--radius-full);
        }

        .course-tab {
            padding: 0.375rem 1.125rem;
            border-radius: var(--radius-full);
            font-size: var(--font-sm);
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted-fg);
            transition: all 0.18s ease;
            letter-spacing: 0.01em;
        }

        .course-tab.active {
            background: var(--primary);
            color: var(--primary-fg);
        }

        .header-course-label {
            margin-left: auto;
            font-size: var(--font-xs);
            font-weight: 600;
            color: var(--muted-fg);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ============================================
           App Layout
           ============================================ */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ============================================
           Sidebar
           ============================================ */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            background: #fafafa;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.25rem 1.25rem 0.75rem;
            flex-shrink: 0;
        }

        .sidebar-course-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.625rem;
        }

        .sidebar-course-badge.basic {
            background: var(--accent-muted);
            color: var(--accent);
        }

        .sidebar-course-badge.advanced {
            background: #fdf4ff;
            color: #7c3aed;
        }

        .sidebar-course-title {
            font-size: var(--font-base);
            font-weight: 700;
            color: var(--fg);
            line-height: 1.4;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0.75rem 1rem;
        }

        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .nav-item {
            display: flex;
            align-items: flex-start;
            gap: 0.625rem;
            padding: 0.625rem 0.75rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.14s ease;
            margin-bottom: 0.125rem;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--border);
        }

        .nav-item.active {
            background: var(--primary);
        }

        .nav-num {
            font-size: var(--font-xs);
            font-weight: 700;
            color: var(--muted-fg);
            min-width: 20px;
            padding-top: 0.1rem;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        .nav-item.active .nav-num {
            color: rgba(255,255,255,0.5);
        }

        .nav-info { display: flex; flex-direction: column; gap: 0.1rem; }

        .nav-title {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--fg);
            line-height: 1.4;
        }

        .nav-item.active .nav-title {
            color: var(--primary-fg);
        }

        .nav-hours {
            font-size: var(--font-xs);
            color: var(--muted-fg);
        }

        .nav-item.active .nav-hours {
            color: rgba(255,255,255,0.45);
        }

        /* ============================================
           Main Content
           ============================================ */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 2.5rem;
            background: var(--bg);
        }

        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-track { background: transparent; }
        .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Session Panel */
        .session-panel {
            display: none;
            max-width: 860px;
        }

        .session-panel.active {
            display: block;
        }

        /* Session Header */
        .session-header {
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .session-meta {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            margin-bottom: 0.75rem;
        }

        .session-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .session-badge.basic {
            background: var(--accent-muted);
            color: var(--accent);
        }

        .session-badge.advanced {
            background: #fdf4ff;
            color: #7c3aed;
        }

        .session-hours {
            font-size: var(--font-xs);
            font-weight: 600;
            color: var(--muted-fg);
            padding: 0.25rem 0.625rem;
            background: var(--secondary);
            border-radius: var(--radius-full);
        }

        .session-title {
            font-size: var(--font-3xl);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--fg);
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }

        .session-subtitle {
            font-size: var(--font-base);
            color: var(--muted-fg);
        }

        /* Content Blocks */
        .content-block {
            margin-bottom: 1.5rem;
        }

        .block-label {
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted-fg);
            margin-bottom: 0.75rem;
        }

        /* Goal Card */
        .goal-card {
            padding: 1.25rem 1.5rem;
            background: var(--accent-muted);
            border: 1px solid var(--accent-border);
            border-radius: var(--radius);
        }

        .goal-card p {
            font-size: var(--font-base);
            color: var(--accent);
            font-weight: 500;
            line-height: 1.7;
        }

        /* Topic List */
        .topic-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .topic-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.875rem 1.125rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: var(--font-base);
            color: var(--fg);
            line-height: 1.5;
        }

        .topic-item::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted-fg);
            margin-top: 0.5rem;
            flex-shrink: 0;
        }

        /* Practice Card */
        .practice-card {
            padding: 1.25rem 1.5rem;
            background: var(--success-muted);
            border: 1px solid #bbf7d0;
            border-radius: var(--radius);
        }

        .practice-card p {
            font-size: var(--font-base);
            color: var(--success);
            font-weight: 500;
            line-height: 1.7;
        }

        /* Placeholder */
        .content-placeholder {
            padding: 2.5rem;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            text-align: center;
            color: var(--muted-fg);
            font-size: var(--font-sm);
        }

        /* ============================================
           Responsive
           ============================================ */
        @media (max-width: 768px) {
            :root { --sidebar-width: 220px; }
            .main-content { padding: 1.25rem 1.25rem; }
            .session-title { font-size: var(--font-2xl); }
        }
    </style>
</head>

        let currentCourse = 'basic';
        let currentSession = 1;

        function renderSidebar(course) {
            const data = COURSES[course];
            const badge = document.getElementById('sidebar-badge');
            const title = document.getElementById('sidebar-title');
            const nav = document.getElementById('sidebar-nav');
            const headerLabel = document.getElementById('header-course-label');

            badge.className = 'sidebar-course-badge ' + data.badgeClass;
            badge.textContent = data.badgeText;
            title.textContent = data.title;
            headerLabel.textContent = data.label;

            nav.innerHTML = data.sessions.map(s => `
                <button class="nav-item${s.num === currentSession ? ' active' : ''}" data-session="${s.num}">
                    <span class="nav-num">0${s.num}</span>
                    <span class="nav-info">
                        <span class="nav-title">${s.title}</span>
                        <span class="nav-hours">${s.hours}</span>
                    </span>
                </button>
            `).join('');

            nav.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    currentSession = parseInt(item.dataset.session);
                    renderSidebar(currentCourse);
                    renderMain(currentCourse);
                });
            });
        }

        function renderMain(course) {
            const data = COURSES[course];
            const s = data.sessions.find(x => x.num === currentSession);
            const main = document.getElementById('main-content');

            main.innerHTML = `
                <div class="session-panel active">
                    <div class="session-header">
                        <div class="session-meta">
                            <span class="session-badge ${data.badgeClass}">${data.badgeText} ${s.num < 10 ? '0' + s.num : s.num}</span>
                            <span class="session-hours">${s.hours}</span>
                        </div>
                        <h1 class="session-title">${s.title}</h1>
                    </div>

                    <div class="content-block">
                        <div class="block-label">학습 목표</div>
                        <div class="goal-card"><p>${s.goal}</p></div>
                    </div>

                    <div class="content-block">
                        <div class="block-label">주요 내용</div>
                        <ul class="topic-list">
                            ${s.topics.map(t => `<li class="topic-item">${t}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="content-block">
                        <div class="block-label">실습</div>
                        <div class="practice-card"><p>${s.practice}</p></div>
                    </div>

                    <div class="content-block">
                        <div class="block-label">수업 자료</div>
                        <div class="content-placeholder">수업 자료가 추가될 예정입니다.</div>
                    </div>
                </div>
            `;
        }

        function init() {
            document.querySelectorAll('.course-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCourse = tab.dataset.course;
                    currentSession = 1;
                    renderSidebar(currentCourse);
                    renderMain(currentCourse);
                });
            });

            renderSidebar(currentCourse);
            renderMain(currentCourse);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
