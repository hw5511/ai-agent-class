<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 에이전트 수업자료</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
    <style>
        /*
         * Lecture App Style
         * Source: lecture/css/style_lecture.css
         *
         * Sections:
         *   1. Design Tokens
         *   2. Reset & Base
         *   3. App Header
         *   4. Course Tabs
         *   5. App Layout
         *   6. Sidebar
         *   7. Slide Area          — overflow:hidden, flex column, 스텝 전환
         *   8. Slide Navigation
         *   9. Session Content     — 2-col grid, 뷰포트 내 완전 수용
         *  10. Badge Variants
         */

        /* ============================================
           1. Design Tokens
           ============================================ */
        :root {
            --bg:           #fff;
            --fg:           #0a0a0a;
            --card:         #fff;
            --primary:      #171717;
            --primary-fg:   #fafafa;
            --secondary:    #f5f5f5;
            --muted:        #f5f5f5;
            --muted-fg:     #737373;
            --border:       #e5e5e5;

            --accent:        #2563eb;
            --accent-muted:  #eff6ff;
            --accent-border: #bfdbfe;

            --advanced:       #7c3aed;
            --advanced-muted: #fdf4ff;

            --success:        #16a34a;
            --success-muted:  #f0fdf4;
            --success-border: #bbf7d0;

            --radius:      0.5rem;
            --radius-full: 9999px;

            --font-xs:   0.75rem;
            --font-sm:   0.875rem;
            --font-base: 1rem;
            --font-lg:   1.125rem;
            --font-xl:   1.25rem;
            --font-2xl:  1.5rem;

            --sidebar-width:    260px;
            --slide-nav-height: 52px;
            --sidebar-transition: 0.22s ease;
            --slide-transition:   0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================
           2. Reset & Base
           ============================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        .sidebar-toggle {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            border: none;
            background: transparent;
            color: var(--muted-fg);
            cursor: pointer;
            transition: background 0.14s, color 0.14s;
            flex-shrink: 0;
        }

        .sidebar-toggle:hover { background: var(--secondary); color: var(--fg); }

        /* ============================================
           4. Course Tabs
           ============================================ */
        .course-tabs {
            display: flex;
            gap: 0.2rem;
            background: var(--secondary);
            padding: 0.2rem;
            border-radius: var(--radius-full);
        }

        .course-tab {
            padding: 0.35rem 1rem;
            border-radius: var(--radius-full);
            font-size: var(--font-sm);
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted-fg);
            transition: background 0.18s, color 0.18s;
            white-space: nowrap;
        }

        .course-tab.active { background: var(--primary); color: var(--primary-fg); }

        /* ============================================
           5. App Layout
           ============================================ */
        .app-body {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ============================================
           6. Sidebar
           ============================================ */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            background: #fafafa;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition:
                width var(--sidebar-transition),
                border-color var(--sidebar-transition);
        }

        .sidebar.collapsed {
            width: 0;
            border-right-color: transparent;
        }

        .sidebar-inner {
            width: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 0.75rem 0.75rem 0.625rem;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        /* 사이드바 상단: 과정 탭 + 접기 버튼 */
        .sidebar-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        /* 사이드바 닫힌 상태에서 좌상단에 표시되는 재열기 버튼 */
        .sidebar-reopen {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            z-index: 50;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--muted-fg);
            cursor: pointer;
            transition: background 0.14s, color 0.14s, opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-reopen.visible { opacity: 1; pointer-events: auto; }
        .sidebar-reopen:hover { background: var(--secondary); color: var(--fg); }

        .sidebar-course-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sidebar-course-badge.basic    { background: var(--accent-muted);   color: var(--accent); }
        .sidebar-course-badge.advanced { background: var(--advanced-muted); color: var(--advanced); }

        .sidebar-course-title {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--fg);
            line-height: 1.4;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 0.375rem 0.75rem 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .sidebar-nav::-webkit-scrollbar       { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .nav-item {
            display: flex;
            align-items: flex-start;
            gap: 0.625rem;
            padding: 0.5rem 0.625rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.13s;
            margin-bottom: 0.125rem;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        /* 비활성 그룹 흐리게 */
        .nav-group {
            opacity: 0.38;
            transition: opacity 0.18s;
        }
        .nav-group:has(.nav-item.active) {
            opacity: 1;
        }
        /* 비활성 그룹 호버: 검은색 테두리 */
        .nav-group:not(:has(.nav-item.active)):hover {
            opacity: 1;
        }
        .nav-group:not(:has(.nav-item.active)):hover .nav-item:hover {
            background: transparent;
            outline: 1.5px solid var(--fg);
        }

        .nav-item:hover          { background: var(--border); }
        .nav-item.active         { background: var(--primary); }

        .nav-num {
            font-size: var(--font-xs);
            font-weight: 700;
            color: var(--muted-fg);
            min-width: 18px;
            padding-top: 0.15rem;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        .nav-item.active .nav-num { color: rgba(255,255,255,0.45); }

        .nav-info {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            min-width: 0;
        }

        .nav-title {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--fg);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-item.active .nav-title { color: var(--primary-fg); }

        .nav-hours {
            font-size: var(--font-xs);
            color: var(--muted-fg);
        }

        .nav-item.active .nav-hours { color: rgba(255,255,255,0.4); }


        /* ============================================
           7. Slide Area
           — 스텝 전환: overflow:hidden, translateX
           ============================================ */
        .slide-area {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        .slides-container {
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* 스텝 슬라이드 */
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 1.25rem 1.75rem 1rem;
            transform: translateX(100%);
            transition: transform var(--slide-transition);
            will-change: transform;
        }

        .slide.is-prev   { transform: translateX(-100%); }
        .slide.is-active { transform: translateX(0); }

        /* ============================================
           8. Slide Navigation
           ============================================ */
        .slide-nav {
            height: var(--slide-nav-height);
            min-height: var(--slide-nav-height);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            flex-shrink: 0;
            background: var(--bg);
            gap: 1rem;
        }

        .slide-btn {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.35rem 0.875rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--fg);
            font-size: var(--font-sm);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.13s, border-color 0.13s, opacity 0.13s;
            white-space: nowrap;
        }

        .slide-btn:hover:not(:disabled) { background: var(--secondary); border-color: #d4d4d4; }
        .slide-btn:disabled             { opacity: 0.3; cursor: not-allowed; }

        .slide-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.375rem;
        }

        .slide-counter {
            font-size: var(--font-xs);
            font-weight: 700;
            color: var(--muted-fg);
            letter-spacing: 0.06em;
        }

        .slide-dots {
            display: flex;
            gap: 0.3rem;
        }

        .slide-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            transition: background 0.18s, width 0.18s;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .slide-dot.active { background: var(--primary); width: 16px; }

        /* ============================================
           9. Session Content
           — 상단: 제목 헤더
           — 하단: 좌 2/3 이미지 슬라이더 + 우 1/3 설명 영역
           — 세로 스크롤 없이 뷰포트 내 완전 수용
           ============================================ */

        .session-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .session-header {
            flex-shrink: 0;
            margin-bottom: 0.875rem;
            padding-bottom: 0.875rem;
            border-bottom: 1px solid var(--border);
        }

        .session-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }

        .session-title {
            font-size: var(--font-2xl);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--fg);
            line-height: 1.3;
        }

        /* 본문 — 이미지 슬라이더 단독 */
        .session-body {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            min-height: 0;
            overflow: hidden;
        }

        /* 좌측 2/3 — 이미지 슬라이더 영역 */
        .body-image {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        /* 이미지 슬라이더 우측 하단 전체화면 진입 버튼 */
        .image-expand-btn {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            z-index: 10;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 6px;
            background: rgba(0,0,0,0.35);
            color: #fff;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.18s, background 0.18s;
        }
        .body-image:hover .image-expand-btn { opacity: 1; }
        .image-expand-btn:hover { background: rgba(0,0,0,0.6); }

        /* 전체화면 오버레이 */
        .fs-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fs-overlay[hidden] { display: none; }

        .fs-image-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fs-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .fs-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            color: #fff;
            cursor: pointer;
            transition: background 0.15s;
        }
        .fs-nav:hover    { background: rgba(255,255,255,0.25); }
        .fs-nav:disabled { opacity: 0.2; cursor: default; }
        .fs-nav.prev     { left: 1.25rem; }
        .fs-nav.next     { right: 1.25rem; }

        .fs-ui {
            position: absolute;
            bottom: 1.25rem;
            right: 1.25rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .fs-counter {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.04em;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        .fs-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            cursor: pointer;
            transition: background 0.15s;
        }
        .fs-close:hover { background: rgba(255,255,255,0.25); }

        /* 이미지 슬라이더 — translateX 전환 */
        .image-slider {
            position: relative;
            flex: 1;
            overflow: hidden;
            border-radius: var(--radius);
            background: #ffffff;
            border: 1px solid var(--border);
            min-height: 0;
        }

        /* 개별 이미지 슬라이드 */
        .image-slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateX(100%);
            transition: transform var(--slide-transition);
            will-change: transform;
        }

        .image-slide.is-prev   { transform: translateX(-100%); }
        .image-slide.is-active { transform: translateX(0); }

        .image-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 이미지 없을 때 플레이스홀더 */
        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
        }

        .image-placeholder-icon  { opacity: 0.35; }
        .image-placeholder-label { font-weight: 600; font-size: var(--font-sm); color: var(--muted-fg); }
        .image-placeholder-sub   { font-size: var(--font-xs); color: var(--muted-fg); opacity: 0.7; }

        /* 우측 1/3 — 설명 영역 */
        .body-desc {
            display: none;
        }

        .content-block {
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex-shrink: 0;
        }

        .content-block.fill {
            flex: 1;
            min-height: 0;
        }

        .block-label {
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted-fg);
            margin-bottom: 0.375rem;
            flex-shrink: 0;
        }

        .goal-card {
            padding: 0.75rem 1rem;
            background: var(--accent-muted);
            border: 1px solid var(--accent-border);
            border-radius: var(--radius);
        }

        .goal-card p {
            font-size: var(--font-sm);
            color: var(--accent);
            font-weight: 500;
            line-height: 1.65;
        }

        .topic-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            list-style: none;
            min-height: 0;
            overflow: hidden;
        }

        .topic-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: var(--font-sm);
            color: var(--fg);
            line-height: 1.4;
            flex-shrink: 0;
        }

        .topic-item::before {
            content: '';
            display: block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--muted-fg);
            margin-top: 0.42rem;
            flex-shrink: 0;
        }

        .practice-card {
            padding: 0.75rem 1rem;
            background: var(--success-muted);
            border: 1px solid var(--success-border);
            border-radius: var(--radius);
        }

        .practice-card p {
            font-size: var(--font-sm);
            color: var(--success);
            font-weight: 500;
            line-height: 1.65;
        }

        /* ============================================
           10. Badge Variants
           ============================================ */
        .badge-basic {
            background: var(--accent-muted);
            color: var(--accent);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-advanced {
            background: var(--advanced-muted);
            color: var(--advanced);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-hours {
            background: var(--secondary);
            color: var(--muted-fg);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: var(--font-xs);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- 5. App Layout -->
    <div class="app-body">

        <!-- 6. Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <div class="sidebar-header">
                    <div class="sidebar-top">
                        <!-- 4. Course Tabs -->
                        <div class="course-tabs">
                            <button class="course-tab active" data-course="basic">기초</button>
                            <button class="course-tab" data-course="advanced">심화</button>
                        </div>
                        <button class="sidebar-toggle" id="sidebar-toggle" title="사이드바 접기">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                <path d="M9 2L3 7l6 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <div class="sidebar-course-badge basic" id="sidebar-badge">BASIC</div>
                    <div class="sidebar-course-title" id="sidebar-title">AI 에이전트 기초 과정</div>
                </div>
                <nav class="sidebar-nav" id="sidebar-nav"></nav>
            </div>
        </aside>

        <!-- 7. Slide Area -->
        <div class="slide-area">
            <button class="sidebar-reopen" id="sidebar-reopen" title="사이드바 열기">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <rect x="0.5" y="2" width="13" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="0.5" y="6.25" width="13" height="1.5" rx="0.75" fill="currentColor"/>
                    <rect x="0.5" y="10.5" width="13" height="1.5" rx="0.75" fill="currentColor"/>
                </svg>
            </button>
            <div class="slides-container" id="slides-container"></div>

            <!-- 8. Slide Navigation -->
            <div class="slide-nav">
                <button class="slide-btn" id="btn-prev">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M9 11L5 7l4-4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    이전
                </button>
                <div class="slide-indicator">
                    <span class="slide-counter" id="slide-counter">STEP 01 · 01 / 01</span>
                    <div class="slide-dots" id="slide-dots"></div>
                </div>
                <button class="slide-btn" id="btn-next">
                    다음
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <script>

                        topics: ['뉴스 자동 수집 노드 구성', 'AI 요약 처리 자동화', '스케줄 트리거 설정 (매일 아침)', '나만의 데이터 수집 파이프라인 구축'],
                        practice: '관심 키워드의 뉴스를 매일 아침 자동 수집·요약하여 Telegram으로 수신하는 파이프라인을 완성한다.',
                        slides: ['01.png','02.png','03.png','04.png','05.png'],
                        slideDescs: [

            { goal: '뉴스 자동 수집 노드를 구성한다.', topics: ['뉴스 RSS / API 선택', '수집 노드 설정', '키워드 필터링 적용', '수집 결과 확인'], practice: null },
            { goal: 'AI 요약 처리를 자동화한다.', topics: ['요약 AI 노드 연결', '요약 포맷 설계', '복수 뉴스 일괄 요약', '요약 결과 확인'], practice: null },
            { goal: '스케줄 트리거를 설정한다.', topics: ['Schedule Trigger 노드', '매일 아침 시간 지정', '트리거 테스트 실행', '실제 발동 확인'], practice: null },
            { goal: '요약 결과를 Telegram으로 자동 전송한다.', topics: ['Telegram 노드 연결', '메시지 포맷 구성', '전송 결과 확인', '전체 파이프라인 완성'], practice: '관심 키워드의 뉴스를 매일 아침 자동 수집·요약하여 Telegram으로 수신하는 파이프라인을 완성한다.' }
                        ]
                    },
                    {
                        num: 8, title: 'Notion 자동화 & Agent Teams', hours: '2시간 · Workflow Automation',
                        goal: 'Notion 페이지 자동 생성/관리 워크플로우를 구축하고, 여러 에이전트가 역할을 분담하여 협업하는 Teams 기능을 실습한다.',
                        topics: ['Notion 페이지 자동 생성 / 관리', 'Notion 데이터베이스 자동 업데이트', 'Agent Teams 개념과 구조', '여러 에이전트 협업 실습'],
                        practice: 'Agent Teams로 팀장 에이전트와 역할별 에이전트를 구성하고, 분산 작업 후 Notion에 결과를 자동 정리하는 흐름을 완성한다.',
                        slides: ['01.png','02.png','03.png','04.png','05.png'],
                        slideDescs: [
            { goal: 'Agent Teams의 개념과 구조를 이해한다.', topics: ['Agent Teams란?', '팀장 에이전트 역할', '역할별 에이전트 분담', '팀 협업 흐름'], practice: null },
            { goal: 'Notion 페이지 자동 생성을 구현한다.', topics: ['Notion MCP 재활용', '페이지 자동 생성 명령', '속성 자동 입력', '생성 결과 확인'], practice: null },
            { goal: 'Notion 데이터베이스를 자동으로 업데이트한다.', topics: ['데이터베이스 항목 추가', '기존 항목 수정 자동화', '필터/정렬 활용', '업데이트 결과 확인'], practice: null },
            { goal: 'Agent Teams를 설정하고 실행한다.', topics: ['Teams 설정 파일 구성', '팀장 + 역할 에이전트 설정', '작업 분배 명령', '각 에이전트 실행 확인'], practice: null },
            { goal: '분산 작업 결과를 Notion에 자동으로 정리한다.', topics: ['에이전트별 결과 수집', 'Notion 자동 정리 구현', '최종 결과물 확인', '심화 과정 전체 복습'], practice: 'Agent Teams로 팀장 에이전트와 역할별 에이전트를 구성하고, 분산 작업 후 Notion에 결과를 자동 정리하는 흐름을 완성한다.' }
                        ]
                    }
                ]
            }
        };

        /* ============================================
           State
           ============================================ */
        let currentCourse  = 'basic';
        let currentSession = 0;   // 현재 스텝 인덱스
        let currentSlide   = 0;   // 현재 스텝 내 이미지 슬라이드 인덱스
        let sidebarOpen    = true;

        /* ============================================
           Helper
           ============================================ */
        function getSlideCount(session) {
            return (session.slides && session.slides.length > 0) ? session.slides.length : 1;
        }

        function getImagePath(course, stepNum, filename) {
            const stepFolder = 'step' + String(stepNum).padStart(2, '0');
            return 'assets/' + course + '/' + stepFolder + '/' + filename;
        }

        /* ============================================
           Slide Rendering
           ============================================ */
        function renderSlides(course) {
            const container = document.getElementById('slides-container');
            const data      = COURSES[course];

            container.innerHTML = data.sessions.map((s, i) => {
                const bc  = data.badgeClass;
                const num = String(s.num).padStart(2, '0');

                // 이미지 슬라이드 HTML 생성
                let imageSlidesHtml;
                if (s.slides && s.slides.length > 0) {
                    imageSlidesHtml = s.slides.map((filename, j) => {
                        const src = getImagePath(course, s.num, filename);
                        return `<div class="image-slide${j === 0 ? ' is-active' : ''}" data-img-index="${j}">
                            <img src="${src}" alt="${s.title} - ${j + 1}"
                                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                            <div class="image-placeholder" style="display:none">
                                <svg class="image-placeholder-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
                                    <rect x="4" y="8" width="32" height="24" rx="3" stroke="#a3a3a3" stroke-width="2"/>
                                    <circle cx="14" cy="17" r="3" stroke="#a3a3a3" stroke-width="1.5"/>
                                    <path d="M4 26l8-6 6 5 6-4 12 8" stroke="#a3a3a3" stroke-width="1.5" stroke-linejoin="round"/>
                                </svg>
                                <span class="image-placeholder-label">이미지 준비 중</span>
                                <span class="image-placeholder-sub">${s.title} · 슬라이드 ${j + 1}</span>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    imageSlidesHtml = `<div class="image-slide is-active" data-img-index="0">
                        <div class="image-placeholder">
                            <svg class="image-placeholder-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
                                <rect x="4" y="8" width="32" height="24" rx="3" stroke="#a3a3a3" stroke-width="2"/>
                                <circle cx="14" cy="17" r="3" stroke="#a3a3a3" stroke-width="1.5"/>
                                <path d="M4 26l8-6 6 5 6-4 12 8" stroke="#a3a3a3" stroke-width="1.5" stroke-linejoin="round"/>
                            </svg>
                            <span class="image-placeholder-label">이미지 / 실습 화면</span>
                            <span class="image-placeholder-sub">${s.title}</span>
                        </div>
                    </div>`;
                }

                return `
                <div class="slide${i === currentSession ? ' is-active' : ''}" data-step-index="${i}">
                    <div class="session-inner">

                        <div class="session-header">
                            <div class="session-meta">
                                <span class="badge-${bc}">${data.badgeText} ${num}</span>
                                <span class="badge-hours">${s.hours}</span>
                            </div>
                            <h1 class="session-title">${s.title}</h1>
                        </div>

                        <div class="session-body">

                            <div class="body-image">
                                <div class="image-slider" data-step="${i}">
                                    ${imageSlidesHtml}
                                </div>
                                <button class="image-expand-btn" title="전체화면 (슬라이드 모드)">
                                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                                        <path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>

                            <div class="body-desc">
                                <div class="content-block">
                                    <div class="block-label">학습 목표</div>
                                    <div class="goal-card"><p class="desc-goal">${s.goal}</p></div>
                                </div>
                                <div class="content-block fill">
                                    <div class="block-label">주요 내용</div>
                                    <ul class="topic-list desc-topics">
                                        ${s.topics.map(t => `<li class="topic-item">${t}</li>`).join('')}
                                    </ul>
                                </div>
                                <div class="content-block">
                                    <div class="block-label">실습</div>
                                    <div class="practice-card"><p class="desc-practice">${s.practice}</p></div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        /* ============================================
           Step (스텝) 위치 적용
           ============================================ */
        function applySlidePositions() {
            document.querySelectorAll('.slide').forEach((el, i) => {
                el.classList.remove('is-prev', 'is-active');
                if (i < currentSession)       el.classList.add('is-prev');
                else if (i === currentSession) el.classList.add('is-active');
            });
        }

        /* ============================================
           Image Slide (스텝 내 이미지) 위치 적용
           ============================================ */
        function applyImageSlidePositions() {
            document.querySelectorAll('.slide').forEach((slideEl, stepIdx) => {
                slideEl.querySelectorAll('.image-slide').forEach((imgSlide, imgIdx) => {
                    imgSlide.classList.remove('is-prev', 'is-active');
                    if (stepIdx === currentSession) {
                        // 현재 스텝: currentSlide 기준으로 위치 설정
                        if (imgIdx < currentSlide)       imgSlide.classList.add('is-prev');
                        else if (imgIdx === currentSlide) imgSlide.classList.add('is-active');
                    } else {
                        // 다른 스텝: 첫 번째 이미지만 active로 초기화
                        if (imgIdx === 0) imgSlide.classList.add('is-active');
                    }
                });
            });
        }

        /* ============================================
           Navigation Indicator
           ============================================ */
        function renderDots(count) {
            const dots = document.getElementById('slide-dots');
            dots.innerHTML = Array.from({ length: count }, (_, i) =>
                `<button class="slide-dot${i === currentSlide ? ' active' : ''}" data-index="${i}"></button>`
            ).join('');
            dots.querySelectorAll('.slide-dot').forEach(dot => {
                dot.addEventListener('click', () => {
                    const idx = parseInt(dot.dataset.index);
                    currentSlide = idx;
                    applyImageSlidePositions();
                    updateIndicator();
                });
            });
        }

        function updateIndicator() {
            const session    = COURSES[currentCourse].sessions[currentSession];
            const slideCount = getSlideCount(session);
            const stepNum    = String(currentSession + 1).padStart(2, '0');

            document.getElementById('slide-counter').textContent =
                `${String(currentSlide + 1).padStart(2, '0')} / ${String(slideCount).padStart(2, '0')}`;

            document.querySelectorAll('.slide-dot').forEach((d, i) =>
                d.classList.toggle('active', i === currentSlide)
            );

            const totalSessions = COURSES[currentCourse].sessions.length;
            const isFirst = currentSession === 0 && currentSlide === 0;
            const isLast  = currentSession === totalSessions - 1 && currentSlide === slideCount - 1;

            document.getElementById('btn-prev').disabled = isFirst;
            document.getElementById('btn-next').disabled = isLast;
        }

        /* ============================================
           Sidebar
           ============================================ */
        function renderSidebar(course) {
            const data = COURSES[course];
            document.getElementById('sidebar-badge').className = `sidebar-course-badge ${data.badgeClass}`;
            document.getElementById('sidebar-badge').textContent = data.badgeText;
            document.getElementById('sidebar-title').textContent = data.title;

            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = data.sessions.map((s, i) => {
                const isActive = i === currentSession;
                return `<div class="nav-group" data-group="${i}">
                    <button class="nav-item${isActive ? ' active' : ''}" data-index="${i}">
                        <span class="nav-num">${String(s.num).padStart(2, '0')}</span>
                        <span class="nav-info">
                            <span class="nav-title">${s.title}</span>
                            <span class="nav-hours">${s.hours}</span>
                        </span>
                    </button>
                </div>`;
            }).join('');

            nav.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    goToSession(parseInt(item.dataset.index));
                });
            });
        }

        function updateSidebarActive() {
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentSession);
            });
        }

        /* ============================================
           Navigation Logic
           ============================================ */

        // 스텝 내 이미지 슬라이드 이동 (경계에서 스텝 전환)
        function goToSlide(delta) {
            const session    = COURSES[currentCourse].sessions[currentSession];
            const slideCount = getSlideCount(session);
            const next       = currentSlide + delta;
            const totalSessions = COURSES[currentCourse].sessions.length;

            if (next < 0) {
                // 이전 스텝으로 이동 (마지막 슬라이드로)
                if (currentSession > 0) {
                    const prevSession    = COURSES[currentCourse].sessions[currentSession - 1];
                    const prevSlideCount = getSlideCount(prevSession);
                    goToSession(currentSession - 1, prevSlideCount - 1);
                }
            } else if (next >= slideCount) {
                // 다음 스텝으로 이동 (첫 슬라이드로)
                if (currentSession < totalSessions - 1) {
                    goToSession(currentSession + 1, 0);
                }
            } else {
                currentSlide = next;
                applyImageSlidePositions();
                updateIndicator();
                updateSidebarActive();
                updateDescPanel();
            }
        }

        // 특정 스텝으로 이동
        function goToSession(index, slideIndex = 0) {
            const count = COURSES[currentCourse].sessions.length;
            if (index < 0 || index >= count) return;
            currentSession = index;
            currentSlide   = slideIndex;
            applySlidePositions();
            applyImageSlidePositions();
            renderDots(getSlideCount(COURSES[currentCourse].sessions[currentSession]));
            updateIndicator();
            updateSidebarActive();
            updateDescPanel();
        }

        /* ============================================
           Desc Panel Update (슬라이드별 우측 패널 갱신)
           ============================================ */
        function updateDescPanel() {
            const activeEl = document.querySelector('.slide.is-active');
            if (!activeEl) return;

            const session = COURSES[currentCourse].sessions[currentSession];
            const sd      = session.slideDescs && session.slideDescs[currentSlide];

            const goalEl   = activeEl.querySelector('.desc-goal');
            const topicsEl = activeEl.querySelector('.desc-topics');
            const pracEl   = activeEl.querySelector('.desc-practice');

            if (goalEl)   goalEl.textContent   = (sd && sd.goal)     ? sd.goal     : session.goal;
            if (pracEl)   pracEl.textContent   = (sd && sd.practice) ? sd.practice : session.practice;

            const items = (sd && sd.topics) ? sd.topics : session.topics;
            if (topicsEl) topicsEl.innerHTML = items.map(t => `<li class="topic-item">${t}</li>`).join('');
        }

        /* ============================================
           Event Listeners
           ============================================ */
        document.getElementById('sidebar-toggle').addEventListener('click', () => {
            sidebarOpen = false;
            document.getElementById('sidebar').classList.add('collapsed');
            document.getElementById('sidebar-reopen').classList.add('visible');
        });

        document.getElementById('sidebar-reopen').addEventListener('click', () => {
            sidebarOpen = true;
            document.getElementById('sidebar').classList.remove('collapsed');
            document.getElementById('sidebar-reopen').classList.remove('visible');
        });

        document.getElementById('btn-prev').addEventListener('click', () => goToSlide(-1));
        document.getElementById('btn-next').addEventListener('click', () => goToSlide(1));

        document.addEventListener('keydown', e => {
            const fsOpen = !document.getElementById('fs-overlay').hidden;
            if (e.key === 'ArrowLeft')  { goToSlide(-1); if (fsOpen) fsUpdateImage(); }
            if (e.key === 'ArrowRight') { goToSlide(1);  if (fsOpen) fsUpdateImage(); }
        });

        /* ============================================
           Course Tab Switch
           ============================================ */
        document.querySelectorAll('.course-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCourse  = tab.dataset.course;
                currentSession = 0;
                currentSlide   = 0;
                renderSlides(currentCourse);
                renderDots(getSlideCount(COURSES[currentCourse].sessions[0]));
                renderSidebar(currentCourse);
                updateIndicator();
            });
        });

        /* ============================================
           Fullscreen Mode
           ============================================ */
        function fsUpdateImage() {
            const session    = COURSES[currentCourse].sessions[currentSession];
            const slideCount = getSlideCount(session);
            const img        = document.getElementById('fs-img');

            if (session.slides && session.slides.length > 0) {
                img.src = getImagePath(currentCourse, session.num, session.slides[currentSlide]);
                img.alt = session.title + ' - ' + (currentSlide + 1);
            } else {
                img.src = '';
                img.alt = '';
            }

            document.getElementById('fs-counter').textContent =
                String(currentSlide + 1).padStart(2, '0') + ' / ' + String(slideCount).padStart(2, '0');

            const totalSessions = COURSES[currentCourse].sessions.length;
            document.getElementById('fs-prev').disabled = currentSession === 0 && currentSlide === 0;
            document.getElementById('fs-next').disabled =
                currentSession === totalSessions - 1 && currentSlide === slideCount - 1;
        }

        function openFullscreen() {
            document.getElementById('fs-overlay').removeAttribute('hidden');
            document.body.style.overflow = 'hidden';
            fsUpdateImage();
        }

        function closeFullscreen() {
            document.getElementById('fs-overlay').setAttribute('hidden', '');
            document.body.style.overflow = '';
        }

        /* ============================================
           Init
           ============================================ */
        document.addEventListener('DOMContentLoaded', () => {
            renderSlides(currentCourse);
            renderDots(getSlideCount(COURSES[currentCourse].sessions[0]));
            renderSidebar(currentCourse);
            updateIndicator();

            // 전체화면 진입 버튼 이벤트 (renderSlides 후 등록)
            document.getElementById('slides-container').addEventListener('click', e => {
                if (e.target.closest('.image-expand-btn')) openFullscreen();
            });

            // 전체화면 오버레이 버튼
            document.getElementById('fs-prev').addEventListener('click', () => {
                goToSlide(-1);
                fsUpdateImage();
            });
            document.getElementById('fs-next').addEventListener('click', () => {
                goToSlide(1);
                fsUpdateImage();
            });
            document.getElementById('fs-close').addEventListener('click', closeFullscreen);

            // ESC로 종료
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape' && !document.getElementById('fs-overlay').hidden) {
                    closeFullscreen();
                }
            });
        });
    </script>

    <!-- 전체화면 슬라이드 오버레이 -->
    <div class="fs-overlay" id="fs-overlay" hidden>
        <button class="fs-nav prev" id="fs-prev">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="fs-image-wrap">
            <img id="fs-img" src="" alt="">
        </div>
        <button class="fs-nav next" id="fs-next">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M7 4l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="fs-ui">
            <span class="fs-counter" id="fs-counter"></span>
            <button class="fs-close" id="fs-close" title="닫기 (ESC)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>
</body>
